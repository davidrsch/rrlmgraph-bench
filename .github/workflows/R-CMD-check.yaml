on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest, r: "release" }
          - { os: ubuntu-latest, r: "oldrel-1" }
          - { os: ubuntu-latest, r: "oldrel-2" }
          - { os: ubuntu-latest, r: "oldrel-3" }
          - { os: ubuntu-latest, r: "devel", http-user-agent: "release" }
          - { os: windows-latest, r: "release" }
          - { os: macos-latest, r: "release" }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::devtools, any::spelling, github::davidrsch/rrlmgraph
          needs: check

      - name: Document
        run: |
          Rscript -e 'devtools::document()'
          mkdir -p spell-debug
          git diff man/ > spell-debug/rd_diff.txt 2>&1 || true

      - name: Spell check
        shell: Rscript {0}
        run: |
          dir.create("spell-debug", showWarnings = FALSE)
          res <- spelling::spell_check_package()
          if (nrow(res) > 0L) {
            print(res)
            # spell_check_package() returns a list-column (found); flatten it
            # before writing so write.csv doesn't die on 'unimplemented type list'.
            res_flat <- res
            res_flat$found <- vapply(
              res$found,
              function(x) paste(x, collapse = "; "),
              character(1L)
            )
            write.csv(res_flat, "spell-debug/spell_failures.csv", row.names = FALSE)
            stop("Spell check failed -- add words to inst/WORDLIST.",
                 call. = FALSE)
          }

      - name: Upload spell-check debug
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spell-debug-${{ matrix.config.r }}
          path: spell-debug/

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
          args: 'c("--no-manual", "--as-cran")'
