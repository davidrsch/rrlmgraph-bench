on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Bypass the version-bump gate and always run"
        type: boolean
        default: false
  schedule:
    - cron: "0 3 * * *"  # primary window: 03:00 UTC
    - cron: "0 9 * * *"  # fallback: 09:00 UTC (quota may have reset)
    - cron: "0 15 * * *" # second fallback: 15:00 UTC
    - cron: "0 21 * * *" # third fallback: 21:00 UTC

name: run-benchmark

# Prevent two benchmark runs from executing in parallel.  Concurrent runs
# read the same manifest, run identical combos (fixed seed=42 shuffle), and
# race to push results -- the second push fails with a rebase conflict and
# all its work is lost.  Queuing (cancel-in-progress: false) means a manual
# dispatch triggered while the cron run is in progress will wait and then
# start correctly from the updated manifest.
concurrency:
  group: run-benchmark
  cancel-in-progress: false

permissions:
  contents: write # needed to commit results and version stamp
  models: read # needed for GitHub Models inference API

# ── Job 1: work-to-do gate ────────────────────────────────────────────────────
# A cheap (~10 s) job that decides whether the benchmark needs to run.
# The benchmark is skipped ONLY when BOTH of these are true:
#   (a) rrlmgraph upstream version has not changed since the last run
#   (b) all expected rows (n_tasks x n_strategies x n_trials) are present
#
# The decision is purely data-driven and identical for scheduled and manual
# runs.  Use force_run=true to explicitly re-run a complete benchmark.
#
# State is read from inst/results/benchmark_manifest.json (written by the
# commit step after every run -- complete or partial).  This is the single
# source of truth; there is no manually-seeded stamp file that can go stale.
# The manifest is plain JSON, parsed here with `jq` (pre-installed on all
# ubuntu-latest runners).
#
# Version-bump → fresh_start:
#   When the gate detects a version change, it emits fresh_start=true.
#   The benchmark job then deletes any partial checkpoint and runs with
#   resume=FALSE, ensuring all rows in the output RDS belong to the SAME
#   algorithm version (required for valid Wilcoxon comparisons).
#
# Failure modes handled:
#   • curl fails (network)         → default to RUN (fail-open)
#   • manifest missing             → STORED_VER=none → always runs first time
#   • completed_rows < expected    → always runs (missing trials)
#   • version changed              → always runs (fresh_start=true)
#   • force_run=true               → always runs

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      remote_version: ${{ steps.gate.outputs.remote_version }}
      fresh_start: ${{ steps.gate.outputs.fresh_start }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine whether to run benchmark
        id: gate
        run: |
          # Fetch the latest rrlmgraph DESCRIPTION from GitHub.
          # If curl fails (rate-limit / network outage), default to running so
          # a version bump is never silently missed.
          REMOTE_VER=$(curl -sf \
            "https://raw.githubusercontent.com/davidrsch/rrlmgraph/main/DESCRIPTION" \
            | grep '^Version:' | awk '{print $2}' || echo "")

          if [ -z "$REMOTE_VER" ]; then
            echo "::warning::Could not fetch rrlmgraph remote version — defaulting to RUN"
            echo "skip=false"            >> "$GITHUB_OUTPUT"
            echo "remote_version=unknown" >> "$GITHUB_OUTPUT"
            echo "fresh_start=false"      >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "remote_version=$REMOTE_VER" >> "$GITHUB_OUTPUT"

          # Read the manifest written by the previous run's commit step.
          # Falls back to sentinel values that guarantee a first-time run.
          MANIFEST="inst/results/benchmark_manifest.json"
          if [ -f "$MANIFEST" ]; then
            STORED_VER=$(jq -r '.rrlmgraph_version // "none"' "$MANIFEST")
            STORED_COMPLETED=$(jq -r '.completed_rows // 0' "$MANIFEST")
            STORED_EXPECTED=$(jq -r '.expected_rows // 9999' "$MANIFEST")
            # Guard against corrupt JSON -- treat non-numeric as sentinel
            echo "$STORED_COMPLETED" | grep -qE '^[0-9]+$' || STORED_COMPLETED=0
            echo "$STORED_EXPECTED"  | grep -qE '^[0-9]+$' || STORED_EXPECTED=9999
          else
            STORED_VER="none"
            STORED_COMPLETED=0
            STORED_EXPECTED=9999
          fi

          # Emit fresh_start when the upstream version changed (and a prior run
          # exists).  The benchmark job uses this to wipe the partial checkpoint
          # and run with resume=FALSE, preventing cross-version row mixing.
          if [ "$REMOTE_VER" != "$STORED_VER" ] && [ "$STORED_VER" != "none" ]; then
            echo "fresh_start=true" >> "$GITHUB_OUTPUT"
            echo "::notice::rrlmgraph bumped $STORED_VER -> $REMOTE_VER -- fresh start (partial checkpoint will be wiped)"
          else
            echo "fresh_start=false" >> "$GITHUB_OUTPUT"
          fi

          # Skip when ALL of:
          #   (a) version unchanged
          #   (b) benchmark complete: COMPLETED >= EXPECTED
          #   (c) force_run not set
          # The trigger (schedule vs manual dispatch) is irrelevant -- if the
          # work is done and no force is requested, skip regardless of how the
          # workflow was started.  Use force_run=true to explicitly re-run a
          # complete benchmark.
          FORCE="${{ inputs.force_run }}"

          if [ "$REMOTE_VER" = "$STORED_VER" ] \
              && [ "$STORED_COMPLETED" -ge "$STORED_EXPECTED" ] \
              && [ "$FORCE" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Benchmark complete ($STORED_COMPLETED/$STORED_EXPECTED rows) and rrlmgraph still at $REMOTE_VER -- skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            if [ "$STORED_COMPLETED" -lt "$STORED_EXPECTED" ]; then
              echo "::notice::Benchmark incomplete ($STORED_COMPLETED/$STORED_EXPECTED rows) -- running to accumulate remaining trials"
            elif [ "$FORCE" = "true" ]; then
              echo "::notice::force_run=true -- running regardless of completion status"
            fi
          fi

  # ── Job 2: benchmark ──────────────────────────────────────────────────────────
  benchmark:
    needs: gate
    # Skip the entire job (and all its expensive setup) when the gate fired.
    # This saves ~8 min of Node/Ollama/R setup plus 2+ h of LLM calls.
    if: needs.gate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 330 # 5.5 h safety net -- leaves 30 min for cleanup before GHA's 6 h limit
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }} # auto-set, no extra secret needed

    steps:
      - uses: actions/checkout@v4

      # Check out rrlmgraph-mcp so the MCP strategy has a Node.js server to run
      - uses: actions/checkout@v4
        with:
          repository: davidrsch/rrlmgraph-mcp
          path: rrlmgraph-mcp

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rrlmgraph-mcp/package-lock.json

      - name: Install rrlmgraph-mcp dependencies
        run: npm ci
        working-directory: rrlmgraph-mcp

      - name: Build rrlmgraph-mcp
        run: npm run build
        working-directory: rrlmgraph-mcp

      # Install Ollama so rrlmgraph_ollama (embedding strategy) can run.
      # nomic-embed-text is ~274 MB; downloads in ~30 s on GitHub-hosted runners.
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama daemon
        run: ollama serve &

      - name: Wait for Ollama to be ready
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && echo "Ollama ready" && exit 0
            echo "Waiting for Ollama... ($i/30)"
            sleep 2
          done
          echo "ERROR: Ollama did not start in time" && exit 1

      - name: Pull nomic-embed-text model
        run: ollama pull nomic-embed-text

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::ellmer
            any::jsonlite
            github::davidrsch/rrlmgraph
            local::.
          needs: local

      - name: Check GitHub Models access and remaining quota
        id: quota
        run: |
          # Issue a minimal chat-completion call to: (1) verify API access,
          # (2) capture x-ratelimit-remaining-requests so we know exactly how
          # many calls remain today, and (3) derive max_new_tasks to pass to R.
          #
          # Fail-open: if the rate-limit header is absent (provider API change),
          # run unconstrained rather than silently skip.
          http_code=$(curl -s \
            -o /tmp/quota_body.json \
            -w "%{http_code}" \
            -D /tmp/quota_headers.txt \
            -H "Authorization: Bearer $GITHUB_PAT" \
            -H "Content-Type: application/json" \
            -d '{"model":"gpt-4.1-mini","messages":[{"role":"user","content":"OK"}],"max_tokens":1}' \
            "https://models.github.ai/inference/chat/completions")
          if [ "$http_code" = "429" ]; then
            echo "::warning::GitHub Models quota exhausted (HTTP 429) -- skipping benchmark, fallback cron will retry later"
            echo "skip_benchmark=true" >> "$GITHUB_OUTPUT"
            echo "max_new_tasks=0"     >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$http_code" != "200" ]; then
            echo "::error::GitHub Models access check failed (HTTP $http_code): $(cat /tmp/quota_body.json)"
            exit 1
          fi
          echo "GitHub Models access OK"

          # Parse remaining-requests header; subtract 1 for this probe call.
          N_STRATEGIES=7
          REMAINING=$(grep -i 'x-ratelimit-remaining-requests' /tmp/quota_headers.txt \
                      | head -1 | awk '{print $2}' | tr -d '\r' || echo "")
          if echo "$REMAINING" | grep -qE '^[0-9]+$'; then
            REMAINING=$((REMAINING - 1))
            MAX_TASKS=$((REMAINING / N_STRATEGIES))
            echo "::notice::Remaining requests after probe: $REMAINING -> max_new_tasks today: $MAX_TASKS"
          else
            echo "::warning::Could not parse rate-limit headers -- running unconstrained"
            MAX_TASKS=9999
          fi

          echo "max_new_tasks=$MAX_TASKS" >> "$GITHUB_OUTPUT"
          if [ "$MAX_TASKS" -le 0 ]; then
            echo "::warning::API quota near zero -- skipping benchmark today"
            echo "skip_benchmark=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_benchmark=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run benchmark
        if: steps.quota.outputs.skip_benchmark != 'true'
        env:
          # Tells run_full_benchmark() where to find the built MCP server
          RRLMGRAPH_MCP_DIR: ${{ github.workspace }}/rrlmgraph-mcp
          RRLMGRAPH_MAX_NEW_TASKS: ${{ steps.quota.outputs.max_new_tasks }}
          # When the upstream rrlmgraph version changed, the gate sets this to
          # "true" so we wipe the partial checkpoint (preventing cross-version
          # row mixing) and run with resume=FALSE for a scientifically valid run.
          RRLMGRAPH_FRESH_START: ${{ needs.gate.outputs.fresh_start }}
        run: |
          Rscript -e '
            # Translate the quota-derived task ceiling from the environment.
            # 9999 (or missing) means unconstrained.
            max_t_env <- suppressWarnings(
              as.integer(Sys.getenv("RRLMGRAPH_MAX_NEW_TASKS", "9999"))
            )
            max_t <- if (is.na(max_t_env) || max_t_env >= 9999L) NULL else max_t_env

            # Fresh start on version bump: wipe partial so we never mix rows
            # from two different algorithm versions in the same results RDS.
            fresh <- Sys.getenv("RRLMGRAPH_FRESH_START") == "true"
            if (fresh) {
              partial <- "inst/results/benchmark_results_partial.rds"
              if (file.exists(partial)) {
                file.remove(partial)
                message("[CI] rrlmgraph version bumped -- wiped partial checkpoint for clean start")
              }
            }

            results <- rrlmgraphbench::run_full_benchmark(
              output_path   = "inst/results/benchmark_results.rds",
              n_trials      = 3L,
              llm_provider  = "github",
              llm_model     = "gpt-4.1-mini",
              resume        = !fresh,
              max_new_tasks = max_t
            )
            message("Benchmark complete. Rows: ", nrow(results))
            n_na <- sum(is.na(results$score))
            if (n_na > 0) message("  WARNING: ", n_na, " NA score(s) -- likely rate-limit failures")
            message("Score summary: min=", min(results$score, na.rm = TRUE),
                    " max=", max(results$score, na.rm = TRUE),
                    " mean=", round(mean(results$score, na.rm = TRUE), 3))
            message("Total tokens: ", sum(results$total_tokens, na.rm = TRUE))
          '

      - name: Commit results and update manifest
        # Only run when the benchmark actually executed.  If the quota probe
        # returned 0 (skip_benchmark=true), we leave the manifest unchanged:
        # the stored version stays as the previous run's version, so tomorrow's
        # gate will still see "version changed" or "incomplete" and try again.
        # Updating the manifest here when no benchmark ran would incorrectly
        # stamp the new upstream version as "complete" using old row data.
        if: steps.quota.outputs.skip_benchmark != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Write benchmark_manifest.json -- the single source of truth read
          # by the gate on the next run.  Using JSON + jq means:
          #   • no manually-seeded file format to get wrong
          #   • fields are self-documenting and typed (numbers vs strings)
          #   • the gate can never be misled by a stale qualitative label
          RRLMGRAPH_VER="${{ needs.gate.outputs.remote_version }}"
          # When the gate could not reach GitHub (network blip), it emits
          # "unknown".  Writing "unknown" to the manifest would cause a false
          # fresh_start on the NEXT successful gate run: any non-"none" stored
          # version that differs from the real remote version triggers a wipe.
          # Fall back to the installed package version -- it is always accurate
          # because R setup installed rrlmgraph from GitHub earlier this job.
          if [ "$RRLMGRAPH_VER" = "unknown" ]; then
            RRLMGRAPH_VER=$(Rscript --vanilla -e \
              'cat(as.character(utils::packageVersion("rrlmgraph")))' \
              2>/dev/null || echo "unknown")
            echo "::notice::Gate reported unknown version; resolved from installed package: $RRLMGRAPH_VER"
          fi
          EXPECTED_ROWS=$((30 * 7 * 3))  # n_tasks x n_strategies x n_trials
          COMPLETED_ROWS=$(Rscript --vanilla -e \
            'r <- tryCatch(readRDS("inst/results/benchmark_results.rds"),
                           error = function(e) data.frame(score = numeric(0)))
             cat(sum(!is.na(r$score)))' 2>/dev/null || echo 0)

          MANIFEST="inst/results/benchmark_manifest.json"
          jq -n \
            --arg     ver  "$RRLMGRAPH_VER" \
            --argjson comp "$COMPLETED_ROWS" \
            --argjson exp  "$EXPECTED_ROWS" \
            '{rrlmgraph_version: $ver, completed_rows: $comp, expected_rows: $exp}' \
            > "$MANIFEST"
          echo "::notice::Manifest written: rrlmgraph=$RRLMGRAPH_VER rows=$COMPLETED_ROWS/$EXPECTED_ROWS"

          git add inst/results/benchmark_results.rds
          git add "$MANIFEST"
          # Also commit the partial checkpoint so the next daily run can resume
          # from where this one left off (quota-safe incremental accumulation).
          if [ -f inst/results/benchmark_results_partial.rds ]; then
            git add inst/results/benchmark_results_partial.rds
          fi
          # Remove the legacy stamp file if it still exists (transition clean-up)
          git rm --ignore-unmatch inst/last-benchmarked-rrlmgraph-version.txt
          git diff --cached --quiet || \
            git commit -m "chore: update benchmark results [rrlmgraph $RRLMGRAPH_VER]"
          git pull --rebase origin main
          git push

      - name: Trigger pkgdown rebuild
        # GitHub security prevents a GITHUB_TOKEN commit from auto-triggering
        # other workflows (anti-loop protection).  We dispatch pkgdown
        # explicitly here so the published site always reflects the new results.
        # continue-on-error: the GITHUB_TOKEN needs workflow scope; if that
        # permission is absent the dispatch fails with 403 but the benchmark
        # results have already been committed, so we must not fail the run.
        if: always()
        continue-on-error: true
        run: |
          gh workflow run pkgdown.yaml \
            --repo davidrsch/rrlmgraph-bench \
            --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
